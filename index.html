<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KRR FINAL PRO MAX</title>

<style>
body{font-family:sans-serif;background:#eef2f7;margin:0}
.nav{background:#1a237e;color:white;text-align:center;padding:10px}
button{padding:10px;margin:5px;border:none;background:#2e7d32;color:white;border-radius:5px;cursor:pointer}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
.page{display:none}
.active{display:block}
input,select{width:100%;padding:8px;margin:5px 0}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:8px;text-align:center}
</style>
</head>

<body>

<div class="nav">
<h2>KRR FINAL PRO MAX SYSTEM</h2>
<button onclick="openPage('reg')">REG</button>
<button onclick="openPage('edit')">EDIT</button>
<button onclick="openPage('marks')">MARKS</button>
<button onclick="openPage('admin')">ADMIN</button>
</div>

<div class="container">

<!-- REGISTRATION -->
<div id="reg" class="page active card">
<h3>School Info</h3>
<input id="schoolName" placeholder="School Name">
<input id="schoolAddress" placeholder="Address">

<h3>Student Registration</h3>
<input id="name" placeholder="Name">
<input id="father" placeholder="Father">
<input id="mother" placeholder="Mother">
<input id="dob" placeholder="DOB">
<input id="class" placeholder="Class">
<input id="roll" placeholder="Roll No">
<input id="sr" placeholder="SR No">
<input id="pen" placeholder="PEN">

<button onclick="addStudent()">SAVE</button>
</div>

<!-- EDIT -->
<div id="edit" class="page card">
<h3>Edit Students</h3>
<div id="editTable"></div>
</div>

<!-- MARKS ENTRY -->
<div id="marks" class="page card">
<h3>Manual Marks Entry</h3>

<select id="mStudent"></select>

<table>
<tr><th>Subject</th><th>Marks</th></tr>
<tr><td>HINDI</td><td><input id="m1"></td></tr>
<tr><td>ENGLISH</td><td><input id="m2"></td></tr>
<tr><td>MATHS</td><td><input id="m3"></td></tr>
<tr><td>SCIENCE</td><td><input id="m4"></td></tr>
<tr><td>EVS</td><td><input id="m5"></td></tr>
<tr><td>GK</td><td><input id="m6"></td></tr>
</table>

<button onclick="saveMarks()">SAVE MARKS</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page card">

<input type="password" id="pass" placeholder="Password">
<button onclick="login()">LOGIN</button>

<div id="panel" style="display:none">

<select id="aStudent"></select>
<input id="rank" placeholder="Rank">

<button onclick="autoMarks()">AUTO MARKS</button>
<button onclick="autoRank()">FULL RANK</button>
<button onclick="printMarksheet()">PRINT</button>

</div>
</div>

</div>

<script>

const ADMIN_PASS="KRR@2026";
let MASTER=[];

function openPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(id==="edit") loadEdit();
}

function login(){
if(document.getElementById('pass').value===ADMIN_PASS){
document.getElementById('panel').style.display='block';
}else alert("Wrong Password");
}

// ADD STUDENT
function addStudent(){
let s={
school:schoolName.value,
address:schoolAddress.value,
name:name.value,
father:father.value,
mother:mother.value,
dob:dob.value,
class:class.value,
roll:roll.value,
sr:sr.value,
pen:pen.value,
marks:[]
};
MASTER.push(s);
alert("Saved");
loadAll();
}

// LOAD ALL DROPDOWNS
function loadAll(){
let lists=[mStudent,aStudent];
lists.forEach(sel=>{
sel.innerHTML="";
MASTER.forEach((s,i)=> sel.add(new Option(s.name,i)));
});
}

// EDIT TABLE
function loadEdit(){
let html="<table><tr><th>Name</th><th>Father</th><th>Class</th><th>Save</th></tr>";
MASTER.forEach((s,i)=>{
html+=`
<tr>
<td><input id="n${i}" value="${s.name}"></td>
<td><input id="f${i}" value="${s.father}"></td>
<td><input id="c${i}" value="${s.class}"></td>
<td><button onclick="update(${i})">Save</button></td>
</tr>`;
});
document.getElementById("editTable").innerHTML=html+"</table>";
}

function update(i){
MASTER[i].name=document.getElementById("n"+i).value;
MASTER[i].father=document.getElementById("f"+i).value;
MASTER[i].class=document.getElementById("c"+i).value;
alert("Updated");
loadAll();
}

// SAVE MARKS
function saveMarks(){
let i=mStudent.value;
MASTER[i].marks=[
Number(m1.value),Number(m2.value),Number(m3.value),
Number(m4.value),Number(m5.value),Number(m6.value)
];
alert("Marks Saved");
}

// AUTO MARKS
function random(base){return Math.max(40,Math.min(100,base+Math.floor(Math.random()*20-10)))}
function unique(base){
let a=[];
while(a.length<6){
let m=random(base);
if(a.filter(x=>x===m).length<2) a.push(m);
}
return a;
}

function autoMarks(){
let i=aStudent.value;
let r=rank.value;

let base=60;
if(r==1) base=92;
else if(r<=3) base=85;
else if(r<=5) base=75;

MASTER[i].marks=unique(base);
alert("Auto Generated");
}

function autoRank(){
let r=1;
MASTER.forEach((s,i)=>{
let base=60;
if(r==1) base=92;
else if(r<=3) base=85;
else if(r<=5) base=75;
MASTER[i].marks=unique(base);
r++;
});
alert("Ranking Done");
}

// PRINT
function safe(l,v){return v?`<p><b>${l}:</b> ${v}</p>`:""}

function printMarksheet(){
let i=aStudent.value;
let s=MASTER[i];

if(!s.marks.length) return alert("No marks");

let subs=["HINDI","ENGLISH","MATHS","SCIENCE","EVS","GK"];
let rows="",total=0;

subs.forEach((sub,idx)=>{
let m=s.marks[idx];
total+=m;
rows+=`<tr><td>${sub}</td><td>${m}</td></tr>`;
});

let perc=(total/6).toFixed(2);

let remark="Needs Improvement";
if(perc>=85) remark="Outstanding";
else if(perc>=70) remark="Very Good";
else if(perc>=60) remark="Good";
else if(perc>=50) remark="Average";

let html=`
<div style="width:800px;margin:auto;border:5px double #1a237e;padding:20px">

<div style="display:flex;align-items:center">
<img src="logo.jpg" style="width:80px;height:80px">
<div style="flex:1;text-align:center">
<h2>${s.school}</h2>
<p>${s.address}</p>
</div>
</div>

<h3 style="text-align:center">PROGRESS REPORT</h3>

${safe("Name",s.name)}
${safe("Father",s.father)}
${safe("Mother",s.mother)}
${safe("DOB",s.dob)}
${safe("Class",s.class)}
${safe("Roll No",s.roll)}
${safe("SR No",s.sr)}
${safe("PEN",s.pen)}

<table border="1" width="100%" style="border-collapse:collapse;text-align:center">
<tr><th>Subject</th><th>Marks</th></tr>
${rows}
</table>

<h3>Total: ${total}</h3>
<h3>Percentage: ${perc}%</h3>
<h3>Remark: ${remark}</h3>

</div>
`;

let w=window.open("");
w.document.write(html);
w.print();
}

</script>

</body>
</html>
