<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        /* CSS Waisa hi hai jaisa aapka purana design tha */
        :root { --blue: #1a237e; --gold: #b8860b; }
        body { font-family: sans-serif; }
        .nav-bar { background: var(--blue); padding: 15px; color: white; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav-bar">
    <button onclick="showPage('regPage')">REGISTRATION</button>
    <button onclick="showPage('editPage')">EDIT</button>
    <button onclick="showPage('marksPage')">MARKS</button>
    <button onclick="showPage('adminPage')">ADMIN</button>
</div>

<div class="container">
    <div id="regPage" class="page active">
        <h2>Registration</h2>
        <input id="rName" placeholder="Name">
        <input id="rMother" placeholder="Mother Name">
        <input id="rFather" placeholder="Father Name">
        <select id="rClass"><option>NURSERY</option><option>LKG</option><option>UKG</option></select>
        <input id="rRoll" placeholder="Roll No">
        <button onclick="register()">SAVE</button>
    </div>

    <div id="editPage" class="page">
        <h2>Edit Details</h2>
        <select id="eClass" onchange="loadEditTable()"><option>NURSERY</option><option>LKG</option><option>UKG</option></select>
        <div id="editArea"></div>
    </div>

    <div id="marksPage" class="page">
        <h2>Marks Entry</h2>
        <select id="mClass" onchange="filterStudents()"><option>NURSERY</option><option>LKG</option><option>UKG</option></select>
        <select id="mStudent" onchange="showStudentDetail()"></select>
        <div id="marksForm">
            <select id="mSub"><option>HINDI ORAL</option><option>HINDI WRITTEN</option><option>ENGLISH ORAL</option><option>ENGLISH WRITTEN</option></select>
            <input id="v1" placeholder="CCA-I">
            <input id="v2" placeholder="HY">
            <input id="v3" placeholder="CCA-II">
            <input id="v4" placeholder="ANNUAL">
            <button onclick="saveMarks()">UPDATE MARKS</button>
        </div>
    </div>

    <div id="adminPage" class="page">
        <h2>Admin Print</h2>
        <select id="pClass"><option>NURSERY</option><option>LKG</option><option>UKG</option></select>
        <button onclick="printAll()">PRINT MARKSHEETS</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxAKoRnMfGQKmF0QwYFv4s-VjbI7-NXFCS_fL5kKwehsgBhSj2aNFQEYfdX0Z8Lt5GTVA/exec";
    let MASTER = [];

    async function sync() { const res = await fetch(API); MASTER = await res.json(); }
    sync();

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function register() {
        const data = [document.getElementById('rName').value, document.getElementById('rMother').value, document.getElementById('rFather').value, document.getElementById('rClass').value, document.getElementById('rRoll').value, ""];
        fetch(API, { method: "POST", mode: 'no-cors', body: JSON.stringify({action: "appendStudent", rowData: data}) }).then(() => alert("Saved!"));
    }

    async function saveMarks() {
        const i = document.getElementById('mStudent').value;
        const sub = document.getElementById('mSub').value;
        const marksObj = {};
        marksObj[sub+"_CCAI"] = document.getElementById('v1').value;
        marksObj[sub+"_HY"] = document.getElementById('v2').value;
        marksObj[sub+"_CCAII"] = document.getElementById('v3').value;
        marksObj[sub+"_AN"] = document.getElementById('v4').value;
        await fetch(API, { method: "POST", mode: 'no-cors', body: JSON.stringify({action: "updateMarks", rowIndex: parseInt(i), marksObj: marksObj}) });
        alert("Updated!");
    }

    function printAll() {
        const cls = document.getElementById('pClass').value;
        let html = "";
        MASTER.forEach((r, i) => {
            if(i > 0 && r[3] === cls) {
                let m = {}; try { m = JSON.parse(r[6] || "{}"); } catch(e) {}
                let subjects = ["HINDI ORAL", "HINDI WRITTEN", "ENGLISH ORAL", "ENGLISH WRITTEN"];
                
                let rows = subjects.map(s => {
                    // YAHAN FIX HAI: CCAI/CCAII Priority
                    let u1 = m[s+'_CCAI'] || m[s+'_UT1'] || 0;
                    let hy = m[s+'_HY'] || 0;
                    let u2 = m[s+'_CCAII'] || m[s+'_UT2'] || 0;
                    let an = m[s+'_AN'] || 0;
                    return `<tr><td>${s}</td><td>${u1}</td><td>${hy}</td><td>${u2}</td><td>${an}</td></tr>`;
                }).join('');

                html += `<div style="page-break-after:always; border:10px double #1a237e; padding:20px; position:relative;">
                    <div style="text-align:center;"><h1>K.R.R. JUNIOR SCHOOL</h1></div>
                    <p>Name: ${r[0]} | Class: ${r[3]}</p>
                    <table border="1">${rows}</table>
                    <div style="margin-top:50px; display:flex; justify-content:space-between;">
                        <span>Class Teacher Sign</span><span>Principal Sign</span>
                    </div>
                </div>`;
            }
        });
        const win = window.open();
        win.document.write(html);
        win.print();
    }
</script>
</body>
</html>
